spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: HealthFlow
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:healthflow_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:healthflow-dev-secret-key-must-be-at-least-32-characters}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
