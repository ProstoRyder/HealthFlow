spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: HealthFlow
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:healthflow_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
